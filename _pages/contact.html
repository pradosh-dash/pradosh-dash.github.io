.contact-card:hover {

}
.contact-card svg {
  color: #1b3a5c;

/* ── Social Icons Row ── */
.social-bar {

  color: #1b3a5c;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
.social-icon:hover {
  background: #1b3a5c;
  border-color: #1b3a5c;
  color: #fff;
  transform: translateY(-2px);
}
.social-label {
  font-size: 0.78rem;
  color: #8a94a2;
  text-align: center;
  margin-top: 0.2rem;
}
.social-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Form ── */
.msg-section {
  max-width: 560px;
}
.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 0.55rem 0.75rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  color: #2d3748;
  background: #fff;
  border: 1px solid #c4cdd8;
  border-radius: 5px;
  margin-bottom: 0.55rem;
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}
.contact-form input:focus,
.contact-form textarea:focus {
  border-color: #1b3a5c;
}
.contact-form textarea {
  min-height: 130px;
  resize: vertical;
}
.contact-form input::placeholder,
.contact-form textarea::placeholder {
  color: #a0aec0;
}
.contact-form .form-row {
  display: flex;
  gap: 0.55rem;
}
.contact-form .form-row input {
  flex: 1;
}
.contact-form button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0.55rem 1.5rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  color: #fff;
  background: #1b3a5c;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}
.contact-form button:hover {
  background: #0f2a4a;
  box-shadow: 0 2px 10px rgba(15,42,74,0.18);
}

@media (max-width: 600px) {
  .contact-cards { flex-direction: column; }
  .contact-form .form-row { flex-direction: column; gap: 0; }
}
